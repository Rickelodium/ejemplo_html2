<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción - Expo Joven</title>
</head>
<body>
    <header>
        <h1>Formulario de Inscripción</h1>
    </header>

    <nav>
        <p><a href="../index.html">Volver al Inicio</a></p>
    </nav>

    <main>
        <section>
            <h2>Regístrate para participar</h2>
            
            <form action="#" method="POST" id="form-inscripcion">
                <p>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" class="input-text" placeholder="Ingresa tu nombre" required>
                </p>
                <p>
                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" class="input-text" placeholder="Ingresa tu apellido" required>
                </p>
                <p>
                    <label for="correo">Correo electrónico:</label>
                    <input type="email" id="correo" name="correo" class="input-text" placeholder="ejemplo@correo.com" required>
                </p>
                <p>
                    <label for="edad">Edad:</label>
                    <input type="number" id="edad" name="edad" min="15" required>
                </p>
                <p>
                    <label for="curso">Curso de interés:</label>
                    <select id="curso" name="curso" required>
                        <option value="" disabled selected>Selecciona un curso</option>
                        <option value="html">HTML y CSS</option>
                        <option value="js">JavaScript</option>
                        <option value="php">PHP y MySQL</option>
                    </select>
                </p>
                <p>
                    Turno preferido:<br>
                    <input type="radio" id="manana" name="turno" value="manana" required>
                    <label for="manana">Mañana</label><br>
                    <input type="radio" id="tarde" name="turno" value="tarde">
                    <label for="tarde">Tarde</label>
                </p>
                <p>
                    <input type="checkbox" id="condiciones" name="condiciones" required>
                    <label for="condiciones">Acepto las condiciones del evento</label>
                </p>
                
                <button type="submit" value="Enviar Datos" class="btn-submit">Enviar Inscripción</button>
            </form>
        </section>
    </main>

    <footer>
        <p>Expo Joven Full Stack 2026</p>
    </footer>
</body>
</html>
